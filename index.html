<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>click preston</title>
    <style>
        body { margin: 0; padding: 0; display: flex; height: 100vh; background-color: #ffffff; font-family: Arial, sans-serif; overflow: hidden; user-select: none; }
        #overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #fff; display: flex; justify-content: center; align-items: center; z-index: 100; cursor: pointer; }
        #overlay h2 { font-size: 50px; border: 5px solid #000; padding: 20px; }
        .sidebar { width: 250px; height: 100%; border-right: 2px solid #000; padding: 20px; box-sizing: border-box; background-color: #fff; }
        .sidebar p { margin: 0; line-height: 1.5; font-size: 18px; cursor: pointer; padding: 10px; border: 1px solid transparent; }
        .sidebar p:hover { border: 1px solid #000; }
        .main-display { flex-grow: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        .counter { font-size: 40px; font-weight: bold; margin-bottom: 20px; }
        .click-target { width: 500px; height: auto; display: block; cursor: pointer; transition: transform 0.05s ease-in-out; }
    </style>
</head>
<body>

    <div id="overlay">
        <h2>CLICK TO START GAME</h2>
    </div>

    <div class="sidebar">
        <p id="upgrade-btn">
            UPGRADES:<br>
            <span id="inc-display">1</span>+ click<br>
            Price: <span id="price-display">15</span> yams
        </p>

        <p id="autoclicker-1" onclick="buyAuto1()">
            YAM CLICKER:<br>
            1 click / 1.5s<br>
            Price: 150 yams
        </p>

        <p id="autoclicker-2" onclick="buyAuto2()">
            YAM UPGRADER:<br>
            2 clicks / 1s<br>
            Price: 300 yams
        </p>
    </div>

    <div class="main-display">
        <h1>CLICK preston for yams</h1>
        <div class="counter" id="yam-display">0 YAMS</div>
        
        <video id="click-video" class="click-target" preload="auto" playsinline muted>
            <source src="ambatakum.mp4" type="video/mp4">
        </video>

        <audio id="bg-music" src="ambatakum.mp3" preload="auto"></audio>
    </div>

    <script src="script.js"></script>
</body>
</html>
